<svg width="1200" height="740" viewBox="0 0 1200 740" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0f18"/>
    </linearGradient>
    <linearGradient id="blue" x1="66" y1="168" x2="386" y2="642" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b9bff"/><stop offset="1" stop-color="#3f7fe6"/>
    </linearGradient>
    <linearGradient id="green" x1="394" y1="168" x2="680" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3ed07a"/><stop offset="1" stop-color="#2fb469"/>
    </linearGradient>
    <linearGradient id="orange" x1="394" y1="426" x2="544" y2="556" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffbe45"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="teal" x1="552" y1="426" x2="680" y2="556" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#45d4e0"/><stop offset="1" stop-color="#23b5c4"/>
    </linearGradient>
    <style>
      text { font-family: "Segoe UI", "Arial", sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="740" fill="url(#page)"/>

  <!-- window -->
  <rect x="40" y="36" width="1120" height="668" rx="18" fill="#141d2e" stroke="#26344b"/>
  <!-- title bar -->
  <path d="M40 54 a18 18 0 0 1 18 -18 h1084 a18 18 0 0 1 18 18 v42 h-1120 z" fill="#0f172a"/>
  <line x1="40" y1="96" x2="1160" y2="96" stroke="#1e2a3e"/>
  <circle cx="1136" cy="66" r="7" fill="#ff5f57"/>
  <circle cx="1112" cy="66" r="7" fill="#febc2e"/>
  <circle cx="1088" cy="66" r="7" fill="#28c840"/>
  <text x="600" y="72" text-anchor="middle" fill="#8496ad" font-size="16" font-weight="500">‏ניהול אחסון — C:‏ ‏(1.8TB)‏</text>

  <!-- tabs -->
  <rect x="924" y="122" width="82" height="34" rx="9" fill="#2a6bd6" stroke="#4f93ff"/>
  <text x="965" y="145" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">עיון</text>
  <text x="820" y="145" text-anchor="middle" fill="#9db0c6" font-size="15" font-weight="500">התיקיות הכי גדולות</text>
  <text x="690" y="145" text-anchor="middle" fill="#9db0c6" font-size="15" font-weight="500">שינויים</text>

  <!-- treemap tiles -->
  <rect x="66"  y="168" width="320" height="474" rx="12" fill="url(#blue)"/>
  <text x="86" y="200" fill="#ffffff" font-size="22" font-weight="700">Games</text>
  <text x="86" y="226" fill="#eaf1ff" font-size="16">612 GB · 41%</text>

  <rect x="394" y="168" width="286" height="250" rx="12" fill="url(#green)"/>
  <text x="414" y="200" fill="#ffffff" font-size="20" font-weight="700">Users</text>
  <text x="414" y="224" fill="#eafff1" font-size="15">388 GB · 26%</text>

  <rect x="394" y="426" width="150" height="130" rx="11" fill="url(#orange)"/>
  <text x="410" y="456" fill="#3a2600" font-size="16" font-weight="700">Program</text>
  <text x="410" y="476" fill="#3a2600" font-size="16" font-weight="700">Files</text>
  <text x="410" y="498" fill="#5a3f10" font-size="13" font-weight="600">141 GB</text>

  <rect x="552" y="426" width="128" height="130" rx="11" fill="url(#teal)"/>
  <text x="568" y="456" fill="#04252a" font-size="16" font-weight="700">Windows</text>
  <text x="568" y="478" fill="#0a3238" font-size="13" font-weight="600">96 GB</text>

  <rect x="394" y="564" width="286" height="78" rx="11" fill="#8258f0"/>
  <text x="414" y="596" fill="#ffffff" font-size="17" font-weight="700">ProgramData</text>
  <text x="414" y="618" fill="#e8ddff" font-size="13">44 GB · 3%</text>

  <!-- list -->
  <g>
    <!-- row template: name (right), size (left), bar -->
    <!-- Games -->
    <text x="1120" y="192" text-anchor="end" fill="#eef3f9" font-size="16" font-weight="500">Games 📁</text>
    <text x="700" y="192" fill="#9db0c6" font-size="15">612 GB · 41%</text>
    <rect x="700" y="204" width="420" height="9" rx="5" fill="#0c1422"/>
    <rect x="700" y="204" width="420" height="9" rx="5" fill="#4f93ff"/>
    <!-- Users -->
    <text x="1120" y="262" text-anchor="end" fill="#eef3f9" font-size="16" font-weight="500">Users 📁</text>
    <text x="700" y="262" fill="#9db0c6" font-size="15">388 GB · 26%</text>
    <rect x="700" y="274" width="420" height="9" rx="5" fill="#0c1422"/>
    <rect x="700" y="274" width="265" height="9" rx="5" fill="#35c46a"/>
    <!-- Program Files -->
    <text x="1120" y="332" text-anchor="end" fill="#eef3f9" font-size="16" font-weight="500">Program Files 📁</text>
    <text x="700" y="332" fill="#9db0c6" font-size="15">141 GB · 9%</text>
    <rect x="700" y="344" width="420" height="9" rx="5" fill="#0c1422"/>
    <rect x="700" y="344" width="98" height="9" rx="5" fill="#ffb020"/>
    <!-- Windows -->
    <text x="1120" y="402" text-anchor="end" fill="#eef3f9" font-size="16" font-weight="500">Windows 📁</text>
    <text x="700" y="402" fill="#9db0c6" font-size="15">96 GB · 6%</text>
    <rect x="700" y="414" width="420" height="9" rx="5" fill="#0c1422"/>
    <rect x="700" y="414" width="67" height="9" rx="5" fill="#33c9d6"/>
    <!-- ProgramData -->
    <text x="1120" y="472" text-anchor="end" fill="#eef3f9" font-size="16" font-weight="500">ProgramData 📁</text>
    <text x="700" y="472" fill="#9db0c6" font-size="15">44 GB · 3%</text>
    <rect x="700" y="484" width="420" height="9" rx="5" fill="#0c1422"/>
    <rect x="700" y="484" width="34" height="9" rx="5" fill="#9b6dff"/>
    <!-- Temp -->
    <text x="1120" y="542" text-anchor="end" fill="#eef3f9" font-size="16" font-weight="500">Temp 📁</text>
    <text x="700" y="542" fill="#9db0c6" font-size="15">28 GB · 2%</text>
    <rect x="700" y="554" width="420" height="9" rx="5" fill="#0c1422"/>
    <rect x="700" y="554" width="22" height="9" rx="5" fill="#ff7ab6"/>
    <!-- open in explorer hint -->
    <rect x="700" y="596" width="180" height="34" rx="9" fill="#1b263b" stroke="#26344b"/>
    <text x="790" y="618" text-anchor="middle" fill="#9db0c6" font-size="14">📂 פתח בסייר</text>
  </g>
</svg>
